<svg xmlns="http://www.w3.org/2000/svg" width="820" height="840" viewBox="0 0 820 840" font-family="ui-monospace, 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" role="img" aria-label="z0gcode terminal demo: coding, image generation, transcription, model catalog, parallel subagents, and a verifiable session on 0G Compute">
  <style>
    text { font-size: 14px; }
    .acc { fill: #a78bff; } .mut { fill: #6b7080; } .txt { fill: #c9d1d9; }
    .grn { fill: #3fb950; } .cyn { fill: #56d4dd; } .yel { fill: #d29922; }
    .b { font-weight: 700; } .sm { font-size: 11px; } .lbl { font-size: 11px; letter-spacing: .12em; }
  </style>

  <!-- window -->
  <rect x="8" y="8" width="804" height="824" rx="10" fill="#0d1017" stroke="#30363d"/>
  <rect x="8" y="8" width="804" height="34" rx="10" fill="#161b22"/>
  <rect x="8" y="30" width="804" height="12" fill="#161b22"/>
  <circle cx="28" cy="25" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="25" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="25" r="6" fill="#27c93f"/>
  <text x="410" y="30" text-anchor="middle" class="mut">z0gcode · 0G Compute</text>

  <!-- banner (static) -->
  <text x="24" y="70"><tspan class="acc b">z0gcode</tspan><tspan class="mut"> v0.2 · one coding agent, one key, everything on 0G</tspan></text>
  <text x="24" y="92" class="mut">model <tspan class="txt">0gm-1.0-35b-a3b</tspan> · router-api.0g.ai <tspan class="cyn">◈</tspan> private + verifiable (TEE)</text>

  <!-- ===== scene 1: coding ===== -->
  <text x="790" y="124" text-anchor="end" class="mut lbl" opacity="0"><animate attributeName="opacity" begin="0.4s" dur="0.2s" to="1" fill="freeze"/>CODE</text>
  <text x="24" y="124"><tspan class="acc b">z0g ›</tspan></text>
  <clipPath id="type"><rect x="72" y="110" width="0" height="20"><animate attributeName="width" begin="0.5s" dur="1.5s" from="0" to="500" fill="freeze"/></rect></clipPath>
  <text x="74" y="124" class="txt" clip-path="url(#type)">write isPrime(n) in prime.js and verify it with node</text>
  <rect x="74" y="112" width="8" height="15" fill="#a78bff">
    <animate attributeName="x" begin="0.5s" dur="1.5s" from="74" to="560" fill="freeze"/>
    <animate attributeName="opacity" begin="0.5s" dur="0.6s" values="1;0;1" repeatCount="3"/>
    <animate attributeName="opacity" begin="2.2s" dur="0.1s" to="0" fill="freeze"/>
  </rect>
  <text x="24" y="146" opacity="0"><animate attributeName="opacity" begin="2.3s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> write_file </tspan><tspan class="txt b">prime.js</tspan><tspan class="mut">   </tspan><tspan class="grn">✓</tspan><tspan class="mut"> 911 bytes</tspan></text>
  <text x="24" y="168" class="grn" opacity="0"><animate attributeName="opacity" begin="2.6s" dur="0.12s" to="1" fill="freeze"/>+ function isPrime(n) { <tspan class="mut">… 6k±1, checks divisors up to √n …</tspan> }</text>
  <text x="24" y="190" opacity="0"><animate attributeName="opacity" begin="2.9s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> run_bash </tspan><tspan class="txt b">node prime.js</tspan><tspan class="mut">   </tspan><tspan class="grn">✓</tspan><tspan class="mut"> exit 0 · 13/13 passed</tspan></text>
  <text x="24" y="212" opacity="0"><animate attributeName="opacity" begin="3.2s" dur="0.15s" to="1" fill="freeze"/><tspan class="txt">Done. prime.js written and verified.  </tspan><tspan class="mut">· 0gm-1.0-35b-a3b </tspan><tspan class="cyn">◈</tspan><tspan class="mut"> TEE</tspan></text>

