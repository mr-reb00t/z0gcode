<svg xmlns="http://www.w3.org/2000/svg" width="820" height="552" viewBox="0 0 820 552" font-family="ui-monospace, 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" role="img" aria-label="z0gcode terminal demo: writing and verifying isPrime on 0G Compute">
  <style>
    text { font-size: 14px; }
    .acc { fill: #a78bff; }
    .mut { fill: #6b7080; }
    .txt { fill: #c9d1d9; }
    .grn { fill: #3fb950; }
    .cyn { fill: #56d4dd; }
    .b   { font-weight: 700; }
  </style>

  <!-- window -->
  <rect x="8" y="8" width="804" height="536" rx="10" fill="#0d1017" stroke="#30363d"/>
  <rect x="8" y="8" width="804" height="34" rx="10" fill="#161b22"/>
  <rect x="8" y="30" width="804" height="12" fill="#161b22"/>
  <circle cx="28" cy="25" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="25" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="25" r="6" fill="#27c93f"/>
  <text x="410" y="30" text-anchor="middle" class="mut">z0gcode · 0G Compute</text>

  <!-- banner (static) -->
  <text x="24" y="72"><tspan class="acc b">z0gcode</tspan><tspan class="mut"> v0.2 · coding agent on 0G</tspan></text>
  <text x="24" y="94" class="mut">model <tspan class="txt">0gm-1.0-35b-a3b</tspan> · router-api.0g.ai <tspan class="cyn">◈</tspan> TEE</text>

  <!-- typed command -->
  <text x="24" y="132"><tspan class="acc b">z0g ›</tspan></text>
  <clipPath id="type"><rect x="72" y="118" width="0" height="20"><animate attributeName="width" begin="0.6s" dur="1.7s" from="0" to="620" fill="freeze"/></rect></clipPath>
  <text x="74" y="132" class="txt" clip-path="url(#type)">write an isPrime(n) function in prime.js, then verify it with node</text>
  <rect x="74" y="120" width="8" height="15" fill="#a78bff">
    <animate attributeName="x" begin="0.6s" dur="1.7s" from="74" to="694" fill="freeze"/>
    <animate attributeName="opacity" begin="0.6s" dur="0.7s" values="1;0;1" repeatCount="4"/>
    <animate attributeName="opacity" begin="2.6s" dur="0.1s" to="0" fill="freeze"/>
  </rect>

  <!-- tool: write_file -->
  <text x="24" y="164" opacity="0"><animate attributeName="opacity" begin="2.7s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> write_file </tspan><tspan class="txt b">prime.js</tspan></text>
  <text x="44" y="184" opacity="0"><animate attributeName="opacity" begin="3.0s" dur="0.12s" to="1" fill="freeze"/><tspan class="grn">✓</tspan><tspan class="mut"> wrote prime.js (911 bytes)</tspan></text>

  <!-- diff (green added lines) -->
  <text x="44" y="206" class="grn" opacity="0"><animate attributeName="opacity" begin="3.25s" dur="0.1s" to="1" fill="freeze"/>+ function isPrime(n) {</text>
  <text x="44" y="226" class="grn" opacity="0"><animate attributeName="opacity" begin="3.4s" dur="0.1s" to="1" fill="freeze"/>+   if (n &lt; 2) return false;</text>
  <text x="44" y="246" class="grn" opacity="0"><animate attributeName="opacity" begin="3.55s" dur="0.1s" to="1" fill="freeze"/>+   if (n % 2 === 0 || n % 3 === 0) return false;</text>
  <text x="44" y="266" class="grn" opacity="0"><animate attributeName="opacity" begin="3.7s" dur="0.1s" to="1" fill="freeze"/>+   for (let i = 5; i * i &lt;= n; i += 6) {</text>
  <text x="44" y="286" class="grn" opacity="0"><animate attributeName="opacity" begin="3.85s" dur="0.1s" to="1" fill="freeze"/>+     if (n % i === 0 || n % (i + 2) === 0) return false;</text>
  <text x="44" y="306" class="grn" opacity="0"><animate attributeName="opacity" begin="4.0s" dur="0.1s" to="1" fill="freeze"/>+   }  <tspan class="mut">… + return true; }</tspan></text>

  <!-- tool: run_bash -->
  <text x="24" y="338" opacity="0"><animate attributeName="opacity" begin="4.4s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> run_bash </tspan><tspan class="txt b">node prime.js</tspan></text>
  <text x="44" y="358" opacity="0"><animate attributeName="opacity" begin="4.7s" dur="0.12s" to="1" fill="freeze"/><tspan class="grn">✓</tspan><tspan class="mut"> bash exit 0 · 13/13 tests passed</tspan></text>

  <!-- final answer -->
  <text x="24" y="392" class="txt" opacity="0"><animate attributeName="opacity" begin="5.2s" dur="0.15s" to="1" fill="freeze"/>Done. Wrote <tspan class="b">prime.js</tspan> with a 6k±1 <tspan class="b">isPrime(n)</tspan>; all 13 test</text>
  <text x="24" y="412" class="txt" opacity="0"><animate attributeName="opacity" begin="5.4s" dur="0.15s" to="1" fill="freeze"/>cases pass, including edge cases and 997 / 1009.</text>
  <text x="24" y="440" opacity="0"><animate attributeName="opacity" begin="5.7s" dur="0.2s" to="1" fill="freeze"/><tspan class="mut">· 2870 in / 148 out · 0gm-1.0-35b-a3b · </tspan><tspan class="cyn">◈</tspan><tspan class="mut"> 0G Compute (TEE)</tspan></text>

  <!-- next prompt + blinking caret -->
  <text x="24" y="476" opacity="0"><animate attributeName="opacity" begin="6.0s" dur="0.2s" to="1" fill="freeze"/><tspan class="acc b">z0g ›</tspan></text>
  <rect x="74" y="464" width="8" height="15" fill="#a78bff" opacity="0">
    <animate attributeName="opacity" begin="6.2s" dur="0.9s" values="0;1;1;0;0" repeatCount="indefinite"/>
  </rect>

  <!-- provenance seal footer -->
  <text x="24" y="512" class="mut" font-size="12">Every token served by 0G Compute · private and verifiable (TEE) · z0g attest proves which model wrote it</text>
</svg>
