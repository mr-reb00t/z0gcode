  <text x="24" y="328" opacity="0"><animate attributeName="opacity" begin="4.6s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc b">z0g › </tspan><tspan class="txt">z0g transcribe standup.m4a</tspan></text>
  <text x="24" y="350" opacity="0"><animate attributeName="opacity" begin="4.9s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> whisper-large-v3   </tspan><tspan class="grn">✓</tspan><tspan class="mut"> 42.6s of audio</tspan></text>
  <text x="24" y="372" opacity="0"><animate attributeName="opacity" begin="5.2s" dur="0.12s" to="1" fill="freeze"/><tspan class="txt">"shipped the 0G storage upload, next is the INFT mint…"</tspan></text>
  <text x="24" y="394" opacity="0"><animate attributeName="opacity" begin="5.5s" dur="0.12s" to="1" fill="freeze"/><tspan class="mut">· ~$0.0007 · whisper-large-v3 · </tspan><tspan class="cyn">◈</tspan><tspan class="mut"> 0G Compute (TEE)</tspan></text>

