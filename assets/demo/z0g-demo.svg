  <text x="24" y="248" opacity="0"><animate attributeName="opacity" begin="3.6s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc b">z0g › </tspan><tspan class="txt">z0g image "neon barred-zero 0G logo, violet on black"</tspan></text>
  <text x="24" y="270" opacity="0"><animate attributeName="opacity" begin="3.9s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> z-image-turbo   </tspan><tspan class="grn">✓</tspan><tspan class="txt"> saved </tspan><tspan class="txt b">0g-logo.png</tspan><tspan class="mut"> (1024×1024)</tspan></text>
  <text x="24" y="292" opacity="0"><animate attributeName="opacity" begin="4.2s" dur="0.12s" to="1" fill="freeze"/><tspan class="mut">· ~$0.0400 · z-image-turbo · </tspan><tspan class="cyn">◈</tspan><tspan class="mut"> 0G Compute (TEE)</tspan></text>

