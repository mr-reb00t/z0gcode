  <text x="24" y="430" opacity="0"><animate attributeName="opacity" begin="5.9s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc b">z0g › </tspan><tspan class="txt">z0g models</tspan></text>
  <text x="24" y="452" xml:space="preserve" class="mut" opacity="0"><animate attributeName="opacity" begin="6.1s" dur="0.1s" to="1" fill="freeze"/>MODEL             IN/1M   OUT/1M   CTX     TRUST</text>
  <text x="24" y="472" xml:space="preserve" opacity="0"><animate attributeName="opacity" begin="6.25s" dur="0.1s" to="1" fill="freeze"/><tspan class="txt">0gm-1.0-35b-a3b   $0.04   $0.14    131K    </tspan><tspan class="cyn">◆ private</tspan></text>
  <text x="24" y="492" xml:space="preserve" opacity="0"><animate attributeName="opacity" begin="6.4s" dur="0.1s" to="1" fill="freeze"/><tspan class="txt">deepseek-v4-pro   $0.28   $0.42    164K    </tspan><tspan class="acc">◇ verifiable</tspan></text>
  <text x="24" y="512" xml:space="preserve" opacity="0"><animate attributeName="opacity" begin="6.55s" dur="0.1s" to="1" fill="freeze"/><tspan class="txt">glm-5.2           $0.11   $0.22    131K    </tspan><tspan class="mut">· open</tspan></text>

  <!-- ===== scene 5: parallel subagents ===== -->
  <text x="790" y="548" text-anchor="end" class="mut lbl" opacity="0"><animate attributeName="opacity" begin="6.9s" dur="0.2s" to="1" fill="freeze"/>SUBAGENTS</text>
  <text x="24" y="548" opacity="0"><animate attributeName="opacity" begin="6.9s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc b">z0g › </tspan><tspan class="txt">review src/ with subagents for security issues</tspan></text>
  <text x="24" y="570" opacity="0"><animate attributeName="opacity" begin="7.2s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> spawn_subagents   </tspan><tspan class="acc">◇</tspan><tspan class="mut"> 3 agents running in parallel on 0G</tspan></text>
  <text x="24" y="592" opacity="0"><animate attributeName="opacity" begin="7.5s" dur="0.12s" to="1" fill="freeze"/><tspan class="mut">  </tspan><tspan class="grn">✓ auth.js</tspan><tspan class="mut">   </tspan><tspan class="grn">✓ api.js</tspan><tspan class="mut">   </tspan><tspan class="grn">✓ db.js</tspan></text>
  <text x="24" y="614" opacity="0"><animate attributeName="opacity" begin="7.8s" dur="0.12s" to="1" fill="freeze"/><tspan class="txt">Synthesized 3 findings from parallel agents. </tspan><tspan class="mut">Cost: cents.</tspan></text>

  <!-- ===== scene 6: verifiable session + attest ===== -->
  <text x="790" y="650" text-anchor="end" class="mut lbl" opacity="0"><animate attributeName="opacity" begin="8.2s" dur="0.2s" to="1" fill="freeze"/>ON-CHAIN</text>
  <text x="24" y="650" opacity="0"><animate attributeName="opacity" begin="8.2s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc b">z0g › </tspan><tspan class="txt">/share --anchor</tspan></text>
  <text x="24" y="672" opacity="0"><animate attributeName="opacity" begin="8.5s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> 0G Storage   </tspan><tspan class="grn">✓</tspan><tspan class="mut"> root </tspan><tspan class="txt">0xb67f4960…</tspan></text>
  <text x="24" y="694" opacity="0"><animate attributeName="opacity" begin="8.8s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc">▶</tspan><tspan class="txt"> 0G Chain     </tspan><tspan class="grn">✓</tspan><tspan class="mut"> anchored </tspan><tspan class="txt">0xa2348022…</tspan><tspan class="mut"> · block 38686571</tspan></text>
  <text x="24" y="716" opacity="0"><animate attributeName="opacity" begin="9.1s" dur="0.12s" to="1" fill="freeze"/><tspan class="acc b">z0g › </tspan><tspan class="txt">z0g attest</tspan></text>
  <text x="24" y="738" opacity="0"><animate attributeName="opacity" begin="9.4s" dur="0.12s" to="1" fill="freeze"/><tspan class="grn">✓</tspan><tspan class="txt"> prime.js  ←  0gm-1.0-35b-a3b   </tspan><tspan class="cyn">◈</tspan><tspan class="mut"> verifiable provenance</tspan></text>

