  <text x="24" y="774" opacity="0"><animate attributeName="opacity" begin="9.8s" dur="0.2s" to="1" fill="freeze"/><tspan class="acc b">z0g ›</tspan></text>
  <rect x="74" y="762" width="8" height="15" fill="#a78bff" opacity="0"><animate attributeName="opacity" begin="10.0s" dur="0.9s" values="0;1;1;0;0" repeatCount="indefinite"/></rect>

  <!-- footer -->
