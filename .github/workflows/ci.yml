name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Only the runtime deps are needed for the offline test suite; the
      # optional on-chain SDKs (ethers, 0g-storage) are skipped. --legacy-peer-deps
      # avoids evaluating the optional SDK's exact-ethers peer pin.
      - run: npm install --omit=optional --legacy-peer-deps
      - name: Syntax check all sources
        run: for f in src/*.mjs bin/*.mjs; do node --check "$f"; done
      - name: Run tests
        run: npm test
